<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentTask - Login</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>



<div class="glass-card">
<div class="background-waves">
    <div class="wave-bg wave1"></div>
    <div class="wave-bg wave2"></div>
    <div class="wave-bg wave3"></div>
</div>
    <div class="card-waves">
        <div class="wave-card a"></div>
        <div class="wave-card b"></div>
        <div class="wave-card c"></div>
    </div>

    <h1>StudentTask</h1>


    <input type="email" id="correo" placeholder="Correo electrónico">

    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">
        Iniciar Sesión
    </button>

    <div class="link">
        ¿No tienes cuenta?
        <a href="registro.html">Regístrate</a>
    </div>

</div>

<div class="transition" id="transition"></div>
<script src="js/login.js"></script>

</body>
</html>
